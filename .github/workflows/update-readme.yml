name: ⚡ Dynamic Profile Engine

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "scripts/update_profile.py"
      - "random_song.txt"
      - ".github/workflows/update-readme.yml"

permissions:
  contents: write

concurrency:
  group: dynamic-profile-readme
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 🧠 Generate dynamic profile sections
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: aryamehta0302
          BLOG_FEEDS: https://medium.com/feed/@aryamehta0302
        run: python scripts/update_profile.py

      - name: 🚀 Commit updates
        run: |
          if git diff --quiet; then
            echo "No dynamic changes found"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assests/*.svg random_song.txt
          git commit -m "chore(profile): refresh dynamic README blocks"
          git push
